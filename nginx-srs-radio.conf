server {
    listen 80 default_server;
    server_name _;
    return 301 https://srs-radio-dev$request_uri;
}

# HTTP-only server for Sonos audio clips (Sonos cannot handle self-signed HTTPS)
server {
    listen 8080;
    server_name _;
    root /var/www/srs-radio/public;

    location /sounds/ {
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}

server {
    listen 443 ssl;
    server_name srs-radio-dev _;
    ssl_reject_handshake off;
    root /var/www/srs-radio/public;

    ssl_certificate     /etc/ssl/certs/srs-radio-dev.pem;
    ssl_certificate_key /etc/ssl/private/srs-radio-dev-key.pem;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 8 16k;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    error_log /var/log/nginx/srs-dashboard_error.log;
    access_log /var/log/nginx/srs-dashboard_access.log;
}
